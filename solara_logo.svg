<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="35 118 340 200" version="1.1"
   xmlns:xlink="http://www.w3.org/1999/xlink"
   xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="sunGrad" x1="159" y1="131" x2="241" y2="213" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   style="stop-color:#FFB347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9533;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#52B5E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3495C9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ══ LAYER 1: Waves (behind sun) ══ -->

  <!-- Wave 1 white outline -->
  <path d="M 50 195 Q 110 180 170 195 Q 230 210 290 195 Q 325 187 360 195"
    stroke="white" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.85" />
  <!-- Wave 1 coloured -->
  <path d="M 50 195 Q 110 180 170 195 Q 230 210 290 195 Q 325 187 360 195"
    stroke="url(#waveGrad)" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.95" />

  <!-- Wave 2 white outline -->
  <path d="M 45 217 Q 105 202 165 217 Q 225 232 285 217 Q 320 209 355 217"
    stroke="white" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.85" />
  <!-- Wave 2 coloured -->
  <path d="M 45 217 Q 105 202 165 217 Q 225 232 285 217 Q 320 209 355 217"
    stroke="url(#waveGrad)" stroke-width="13" fill="none" stroke-linecap="round" opacity="0.95" />

  <!-- ══ LAYER 2: Sun (in front of waves) ══ -->

  <!-- Sun white outline behind -->
  <circle cx="200" cy="170" r="35"
    stroke="white" stroke-width="16" fill="white" opacity="0.85" />

  <!-- Sun amber glow -->
  <ellipse cx="200" cy="170" rx="26" ry="25" fill="#FFB347" opacity="0.80" />

  <!-- Sun orange ring -->
  <circle cx="200" cy="170" r="35"
    stroke="url(#sunGrad)" stroke-width="12" fill="none" opacity="0.95" />

  <!-- ══ LAYER 3: Text — white outline, original fill colours ══ -->

  <!-- SOLARA COAST — original navy fill, white outline -->
  <text x="200" y="260"
    font-family="Verdana, Geneva, sans-serif"
    font-size="31px" font-weight="700"
    text-anchor="middle" letter-spacing="2"
    stroke="white" stroke-width="4"
    paint-order="stroke fill"
    fill="#2b4c5e">SOLARA COAST</text>

  <!-- V I L L A — original blue fill, white outline, matched width -->
  <text x="200" y="283"
    font-family="Verdana, Geneva, sans-serif"
    font-size="20px" font-weight="700"
    text-anchor="middle"
    textLength="195" lengthAdjust="spacing"
    stroke="white" stroke-width="3"
    paint-order="stroke fill"
    fill="#52b5e5">V I L L A</text>

  <!-- Phan Thiết, Vietnam — original slate fill, white outline, matched width -->
  <text x="200" y="305"
    font-family="Verdana, Geneva, sans-serif"
    font-size="13px" font-weight="600"
    text-anchor="middle"
    textLength="195" lengthAdjust="spacing"
    stroke="white" stroke-width="3"
    paint-order="stroke fill"
    fill="#7a9aa8">Phan Thiết, Vietnam</text>

</svg>
