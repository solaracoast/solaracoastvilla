<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solara Coast Villa</title>

<style>
:root {
  --navy:#2b4c5e;
  --navy-dark:#1d3442;
  --blue:#52b5e5;
  --amber:#ffb347;
  --orange:#ff9533;
  --cream:#f7f9fb;
  --white:#ffffff;
}

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: Verdana, sans-serif;
  background: var(--cream);
  overflow-x:hidden;
}

/* NAV */
nav {
  position:fixed;
  top:0; left:0; right:0;
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 40px;
  background:rgba(20,30,40,0.75);
  backdrop-filter:blur(12px);
}

.nav-logo {
  height:60px;
}

/* HERO */
.hero {
  height:100vh;
  position:relative;
  overflow:hidden;
}

/* BACKGROUND IMAGE */
.slide {
  position:absolute;
  inset:0;
  background:url('hero.jpg') center/cover no-repeat;
  animation: zoomSlow 18s ease-in-out infinite alternate;
}

@keyframes zoomSlow {
  from { transform:scale(1.05); }
  to   { transform:scale(1); }
}

/* CINEMATIC OVERLAY */
.hero-overlay {
  position:absolute;
  inset:0;
  z-index:2;
  background:
    linear-gradient(to bottom,
      rgba(10,20,28,0.65) 0%,
      rgba(10,20,28,0.25) 40%,
      rgba(10,20,28,0.85) 100%),
    linear-gradient(to right,
      rgba(10,20,28,0.35) 0%,
      transparent 40%,
      rgba(10,20,28,0.35) 100%);
}

/* HERO CONTENT */
.hero-content {
  position:absolute;
  inset:0;
  z-index:3;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  animation:fadeUp 1.2s ease forwards;
}

/* SPOTLIGHT */
.hero-content::before {
  content:'';
  position:absolute;
  width:520px;
  height:520px;
  background:radial-gradient(circle,
    rgba(0,0,0,0.65) 0%,
    rgba(0,0,0,0.35) 35%,
    rgba(0,0,0,0.15) 55%,
    transparent 75%);
  filter:blur(18px);
  z-index:-1;
}

/* LOGO */
.hero-logo {
  height:240px;
  margin-bottom:30px;
  opacity:0;
  animation:logoFade 1.8s ease forwards;

  filter:
    drop-shadow(0 12px 30px rgba(0,0,0,0.65))
    drop-shadow(0 0 18px rgba(255,255,255,0.25));
}

@keyframes logoFade {
  from { opacity:0; transform:translateY(20px) scale(0.98); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

/* TEXT */
.hero-tagline {
  font-size:11px;
  letter-spacing:0.32em;
  color:var(--amber);
  margin-bottom:12px;
  opacity:0.85;
}

.hero-sub {
  font-size:13px;
  color:rgba(255,255,255,0.75);
  margin-bottom:30px;
}

/* BUTTON */
.btn {
  padding:14px 38px;
  background:linear-gradient(135deg,var(--amber),var(--orange));
  color:white;
  text-decoration:none;
  font-size:11px;
  letter-spacing:0.15em;
  border-radius:4px;
  transition:0.3s;
}
.btn:hover {
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(255,149,51,0.5);
}

/* SCROLL */
.scroll {
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  font-size:9px;
  color:rgba(255,255,255,0.5);
  letter-spacing:0.25em;
  animation:bounce 2s infinite;
}
@keyframes bounce {
  0%,100% { transform:translate(-50%,0); }
  50% { transform:translate(-50%,8px); }
}

/* FILM GRAIN */
.hero::after {
  content:'';
  position:absolute;
  inset:0;
  z-index:4;
  pointer-events:none;
  background-image:url('https://grainy-gradients.vercel.app/noise.svg');
  opacity:0.05;
  mix-blend-mode:overlay;
}

/* MOBILE */
@media(max-width:768px){
  .hero-logo { height:140px; }
  nav { padding:12px 20px; }
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(30px); }
  to   { opacity:1; transform:translateY(0); }
}

</style>
</head>

<body>

<nav>
  <img src="solara_logo.svg" class="nav-logo">
</nav>

<div class="hero">
  <div class="slide"></div>
  <div class="hero-overlay"></div>

  <div class="hero-content">
    <img src="solara_logo.svg" class="hero-logo">

    <div class="hero-tagline">
      NOVAWORLD · PHAN THIẾT · VIETNAM
    </div>

    <div class="hero-sub">
      Where golden sunsets meet the South China Sea
    </div>

    <a href="#" class="btn">RESERVE YOUR STAY</a>
  </div>

  <div class="scroll">SCROLL</div>
</div>

</body>
</html>
